version: 1
meta:
  id: thorp_eco2_light_limited_mass_fractions
  title: Root THORP eCO2 and light-limited mass fraction figure
  journal_target: Nature Plants
  family: thorp_example
  support_level: thin_wrapper
  render_strategy: plotkit_style_main_text_figure
layout:
  rows: 2
  cols: 3
panel_order:
  - lmf_absolute
  - smf_absolute
  - rmf_absolute
  - lmf_difference
  - smf_difference
  - rmf_difference
panels:
  lmf_absolute:
    title: Leaf mass fraction
    x_label: log10(Total dry mass [g])
    y_label: LMF [g g^-1]
    x_limits: [2.0, 7.0]
    y_limits: [0.0, 1.0]
    styling:
      reference_fill_color: '#D0D0D0'
      reference_fill_alpha: 0.7
      reference_line_color: '#6B6B6B'
      scenario_linewidth_pt: 2.2
  smf_absolute:
    title: Shoot mass fraction
    x_label: log10(Total dry mass [g])
    y_label: SMF [g g^-1]
    x_limits: [2.0, 7.0]
    y_limits: [0.0, 1.0]
    styling:
      reference_fill_color: '#D0D0D0'
      reference_fill_alpha: 0.7
      reference_line_color: '#6B6B6B'
      scenario_linewidth_pt: 2.2
  rmf_absolute:
    title: Root mass fraction
    x_label: log10(Total dry mass [g])
    y_label: RMF [g g^-1]
    x_limits: [2.0, 7.0]
    y_limits: [0.0, 1.0]
    styling:
      reference_fill_color: '#D0D0D0'
      reference_fill_alpha: 0.7
      reference_line_color: '#6B6B6B'
      scenario_linewidth_pt: 2.2
  lmf_difference:
    title: Leaf mass fraction difference
    x_label: log10(Total dry mass [g])
    y_label: Delta LMF vs control
    x_limits: [2.0, 7.0]
    y_limits: [-0.15, 0.15]
    difference_panel: true
    styling:
      baseline_color: '#7A7A7A'
      scenario_linewidth_pt: 2.2
  smf_difference:
    title: Shoot mass fraction difference
    x_label: log10(Total dry mass [g])
    y_label: Delta SMF vs control
    x_limits: [2.0, 7.0]
    y_limits: [-0.15, 0.15]
    difference_panel: true
    styling:
      baseline_color: '#7A7A7A'
      scenario_linewidth_pt: 2.2
  rmf_difference:
    title: Root mass fraction difference
    x_label: log10(Total dry mass [g])
    y_label: Delta RMF vs control
    x_limits: [2.0, 7.0]
    y_limits: [-0.15, 0.15]
    difference_panel: true
    styling:
      baseline_color: '#7A7A7A'
      scenario_linewidth_pt: 2.2
legend:
  order:
    - Empirical range
    - Empirical center
    - Woody Gymnosperms
    - Woody Angiosperms
    - Allometric height anchor (7.5m)
    - Allometric height anchor (30.0m)
    - Control
    - Light-limited
    - eCO2 600 ppm
  loc: center right
  bbox_to_anchor: [0.985, 0.54]
figure:
  width_mm: 184
  height_mm: 130
theme:
  name: Phytoritas
  tokens: ../themes/Phytoritas_tokens.yaml
export:
  formats: [png, pdf]
  dpi: 300
  transparent: false
