version: 1
meta:
  id: tdgm_thorp_g_growth_vs_carbon
  title: TDGM THORP-G growth versus carbon stress suite
  journal_target: Nature Plants
  family: tdgm_example
  support_level: thin_wrapper
  render_strategy: plotkit_style_six_panel
panels:
  instant_precipitation:
    title: Precipitation, P
    x_label: Total dry mass, C [mol C]
    y_label: Midday growth, G [(mol C) s^-1]
    x_limits: [10.0, 1000000.0]
    y_limits: [1.0e-10, 1.0e-1]
    reference_anchor_x: 1000.0
    reference_anchor_y: 1.0e-6
  instant_relative_humidity:
    title: Relative humidity, RH
    x_label: Total dry mass, C [mol C]
    y_label: Midday growth, G [(mol C) s^-1]
    x_limits: [10.0, 1000000.0]
    y_limits: [1.0e-10, 1.0e-1]
    reference_anchor_x: 1000.0
    reference_anchor_y: 1.0e-6
  instant_combined:
    title: Both
    x_label: Total dry mass, C [mol C]
    y_label: Midday growth, G [(mol C) s^-1]
    x_limits: [10.0, 1000000.0]
    y_limits: [1.0e-10, 1.0e-1]
    reference_anchor_x: 1000.0
    reference_anchor_y: 1.0e-6
  annual_precipitation:
    x_label: Mean annual dry mass, C [mol C]
    y_label: Annual growth, G [(mol C) s^-1]
    x_limits: [10.0, 10000000.0]
    y_limits: [1.0e-10, 1.0e-2]
    reference_anchor_x: 1000.0
    reference_anchor_y: 1.0e-7
  annual_relative_humidity:
    x_label: Mean annual dry mass, C [mol C]
    y_label: Annual growth, G [(mol C) s^-1]
    x_limits: [10.0, 10000000.0]
    y_limits: [1.0e-10, 1.0e-2]
    reference_anchor_x: 1000.0
    reference_anchor_y: 1.0e-7
  annual_combined:
    x_label: Mean annual dry mass, C [mol C]
    y_label: Annual growth, G [(mol C) s^-1]
    x_limits: [10.0, 10000000.0]
    y_limits: [1.0e-10, 1.0e-2]
    reference_anchor_x: 1000.0
    reference_anchor_y: 1.0e-7
figure:
  width_mm: 190
  height_mm: 150
theme:
  name: nature_plants_like
  tokens: ../themes/nature_plants_like_tokens.yaml
export:
  formats: [png, pdf]
  dpi: 300
  transparent: false
