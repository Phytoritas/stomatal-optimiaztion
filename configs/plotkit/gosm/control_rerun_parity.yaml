version: 1
meta:
  id: gosm_control_rerun_parity
  title: Root GOSM control rerun parity against legacy MATLAB
  journal_target: Nature Plants
  family: rerun_parity
  support_level: thin_wrapper
  render_strategy: plotkit_style_composite
  description: Overlay the current Python GOSM control rerun against the legacy MATLAB control payload.
layout:
  rows: 4
  cols: 1
  hspace: 0.32
x_axis:
  label: Total conductance to CO2, g_c [mol m^-2 s^-1]
  limits:
    - 0.0
    - 0.3
panels:
  - id: a
    title: Growth and NSC
    left_axis:
      label: Growth [umol C s^-1]
      scale: linear
      limits: [0.0, 80.0]
      legend_loc: upper right
      series:
        - key: g0_umol_c_s
          label: G0
          color: "#005F73"
          linewidth_pt: 1.6
        - key: g_umol_c_s
          label: G
          color: "#0A9396"
          linewidth_pt: 1.8
    right_axis:
      label: NSC [mol C]
      scale: linear
      limits: [0.0, 4000.0]
      legend_loc: center right
      series:
        - key: c_nsc_mol
          label: C
          color: "#9B5DE5"
          linewidth_pt: 1.5
  - id: b
    title: Assimilation and transpiration
    left_axis:
      label: Flux [umol or mmol m^-2 s^-1]
      scale: linear
      limits: [0.0, 15.0]
      legend_loc: upper right
      series:
        - key: a_n_umol_m2_s
          label: A_n
          color: "#EE6C4D"
          linewidth_pt: 1.7
        - key: e_mmol_m2_s
          label: E
          color: "#3D5A80"
          linewidth_pt: 1.7
  - id: c
    title: Leaf temperature and VPD
    left_axis:
      label: Leaf temperature [C]
      scale: linear
      limits: [15.0, 25.0]
      legend_loc: upper left
      series:
        - key: t_l_c
          label: T_L
          color: "#AE2012"
          linewidth_pt: 1.6
    right_axis:
      label: VPD [kPa]
      scale: linear
      limits: [0.7, 1.5]
      legend_loc: center right
      series:
        - key: vpd_kpa
          label: D_L
          color: "#0A9396"
          linewidth_pt: 1.5
  - id: d
    title: Water potentials
    left_axis:
      label: Negative water potential [MPa]
      scale: log
      limits: [0.006, 6.0]
      legend_loc: upper right
      series:
        - key: neg_psi_l_mpa
          label: -psi_L
          color: "#3D405B"
          linewidth_pt: 1.6
        - key: neg_psi_s_mpa
          label: -psi_S
          color: "#81B29A"
          linewidth_pt: 1.6
        - key: neg_psi_rc_mpa
          label: -psi_Rc
          color: "#F2CC8F"
          linewidth_pt: 1.6
styling:
  sources:
    python:
      label: Python rerun
      linestyle: "-"
      alpha: 1.0
    legacy:
      label: Legacy MATLAB
      linestyle: "--"
      alpha: 0.95
figure:
  width_mm: 180
  height_mm: 165
theme:
  name: nature_plants_like
  tokens: ../themes/nature_plants_like_tokens.yaml
export:
  formats: [png, pdf]
  dpi: 300
  transparent: false
