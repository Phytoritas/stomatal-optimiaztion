version: 1
meta:
  id: gosm_manuscript_panels
  title: Root GOSM manuscript atomic panels
  journal_target: Nature Plants
  family: gosm_example
  support_level: thin_wrapper
  render_strategy: plotkit_style_panel_bundle
  description: Re-render the root GOSM atomic manuscript panels originally exported for Inkscape assembly.
layout:
  rows: 3
  cols: 3
panel_order:
  - vulnerability_root
  - vulnerability_stem
  - vulnerability_leaf
  - photosynthesis_an_gc
  - photosynthesis_an_ci
  - growth_rm_c
  - growth_g_c
  - growth_g_ta
  - growth_g_e
panels:
  vulnerability_root:
    title: Root vulnerability
    legacy_export_name: vulnerability_curve__belowground
    x_label: -psi [MPa]
    y_label: k_R / k_R,max
    x_limits: [0.0, 12.0]
    y_limits: [0.0, 1.0]
    color: '#3A86FF'
    linewidth_pt: 2.2
    panel_width_mm: 70
    panel_height_mm: 55
  vulnerability_stem:
    title: Stem vulnerability
    legacy_export_name: vulnerability_curve__stem
    x_label: -psi [MPa]
    y_label: k_S / k_S,max
    x_limits: [0.0, 12.0]
    y_limits: [0.0, 1.0]
    color: '#3A86FF'
    linewidth_pt: 2.2
    panel_width_mm: 70
    panel_height_mm: 55
  vulnerability_leaf:
    title: Leaf vulnerability
    legacy_export_name: vulnerability_curve__leaf
    x_label: -psi [MPa]
    y_label: k_L / k_L,max
    x_limits: [0.0, 12.0]
    y_limits: [0.0, 1.0]
    color: '#3A86FF'
    linewidth_pt: 2.2
    panel_width_mm: 70
    panel_height_mm: 55
  photosynthesis_an_gc:
    title: A_n versus g_c
    legacy_export_name: A_n--g_c
    x_label: Normalized g_c
    y_label: Normalized A_n
    x_limits: [0.0, 1.0]
    y_limits: [0.0, 1.0]
    color: '#D00000'
    linewidth_pt: 2.2
    panel_width_mm: 70
    panel_height_mm: 55
  photosynthesis_an_ci:
    title: A_n versus c_i
    legacy_export_name: A_n--c_i
    x_label: Normalized c_i
    y_label: Normalized A_n
    x_limits: [0.0, 1.0]
    y_limits: [0.0, 1.0]
    color: '#D00000'
    linewidth_pt: 2.2
    panel_width_mm: 70
    panel_height_mm: 55
  growth_rm_c:
    title: R_M versus C
    legacy_export_name: R_M--C
    x_label: Normalized C
    y_label: Normalized R_M
    x_limits: [0.0, 1.0]
    y_limits: [0.0, 1.0]
    color: '#2A9D8F'
    linewidth_pt: 2.2
    panel_width_mm: 70
    panel_height_mm: 55
  growth_g_c:
    title: G versus C
    legacy_export_name: G--C
    x_label: Normalized C
    y_label: Normalized G
    x_limits: [0.0, 1.0]
    y_limits: [0.0, 1.0]
    color: '#2A9D8F'
    linewidth_pt: 2.2
    panel_width_mm: 70
    panel_height_mm: 55
  growth_g_ta:
    title: G versus T_a
    legacy_export_name: G--T_a
    x_label: Normalized T_a
    y_label: Normalized G
    x_limits: [0.0, 1.0]
    y_limits: [0.0, 1.0]
    color: '#2A9D8F'
    linewidth_pt: 2.2
    panel_width_mm: 70
    panel_height_mm: 55
  growth_g_e:
    title: G versus E
    legacy_export_name: G--E
    x_label: Normalized E
    y_label: Normalized G
    x_limits: [0.0, 1.0]
    y_limits: [0.0, 1.0]
    color: '#2A9D8F'
    linewidth_pt: 2.2
    panel_width_mm: 70
    panel_height_mm: 55
figure:
  width_mm: 180
  height_mm: 180
theme:
  name: Phytoritas
  tokens: ../themes/Phytoritas_tokens.yaml
export:
  formats:
    - png
    - pdf
  dpi: 300
  transparent: false
