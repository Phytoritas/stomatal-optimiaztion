version: 1
meta:
  id: gosm_sensitivity_some
  title: Steady-state GOH versus alternative AOHs
  journal_target: Nature Plants
  family: gosm_example
  support_level: thin_wrapper
  render_strategy: plotkit_style_composite
  description: Re-render the reduced root GOSM sensitivity figure that compares the steady-state GOH against alternative AOH responses.
layout:
  rows: 2
  cols: 4
rows:
  - metric_key: g_c
    y_label: g_c [mol m^-2 s^-1]
    limits: [0.0, 0.2]
    scale: linear
  - metric_key: lambda
    y_label: lambda [mol mol^-1]
    limits: [0.0002, 0.02]
    scale: log
styling:
  steady_state_color: '#0A9396'
  steady_state_linestyle: '-'
  steady_state_linewidth_pt: 2.2
  study_linewidth_pt: 1.4
figure:
  width_mm: 180
  height_mm: 110
theme:
  name: Phytoritas
  tokens: ../themes/Phytoritas_tokens.yaml
export:
  formats:
    - png
    - pdf
  dpi: 300
  transparent: false
