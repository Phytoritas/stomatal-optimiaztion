exp:
  name: tomics_factorial_example

pipeline:
  model: tomato_legacy
  partition_policy: tomics
  allocation_scheme: 4pool
  theta_substrate: 0.33
  fixed_lai: 2.4
  tomics:
    wet_root_cap: 0.10
    dry_root_cap: 0.18
    lai_target_center: 2.75

forcing:
  csv_path: ../../data/forcing/tomics_tomato_example.csv
  default_dt_s: 21600
  default_co2_ppm: 420
  max_steps: 12

screen:
  partition_policies:
    - legacy
    - thorp_fruit_veg
    - tomics
  theta_substrate:
    - 0.20
    - 0.33
    - 0.50
  wet_root_cap:
    - 0.08
    - 0.10
  dry_root_cap:
    - 0.15
    - 0.18
  lai_target_center:
    - 2.5
    - 3.0
  collapse_non_tomics_tomics_factors: true

paths:
  repo_root: ../..
  output_root: out/tomics_factorial
