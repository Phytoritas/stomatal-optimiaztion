exp:
  name: tomics_knu_harvest_family_factorial

paths:
  repo_root: ../..

validation:
  forcing_csv_path: data/forcing/KNU_Tomato_Env.CSV
  yield_xlsx_path: data/forcing/tomato_validation_data_yield_260321.xlsx
  prepared_output_root: out/tomics/validation/knu/longrun
  resample_rule: 1h
  theta_proxy_mode: bucket_irrigated
  theta_proxy_scenarios: [moderate, wet]
  calibration_end: 2024-08-19

reference:
  current_vs_promoted_config: configs/exp/tomics_current_vs_promoted_factorial_knu.yaml
  current_output_root: out/tomics/validation/knu/architecture/current-factorial
  promoted_output_root: out/tomics/validation/knu/architecture/promoted-factorial

harvest_factorial:
  output_root: ../../out/tomics_knu_harvest_family_factorial
  theta_proxy_scenario: moderate
  cumulative_overlay_spec: configs/plotkit/tomics/knu_harvest_yield_fit_overlay.yaml
  daily_overlay_spec: configs/plotkit/tomics/knu_harvest_daily_increment_overlay.yaml
  mass_balance_overlay_spec: configs/plotkit/tomics/knu_harvest_mass_balance_overlay.yaml
