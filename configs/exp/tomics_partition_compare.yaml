exp:
  name: tomics_partition_compare_example

pipeline:
  model: tomato_legacy
  partition_policy: tomics
  allocation_scheme: 4pool
  theta_substrate: 0.33
  fixed_lai: 2.4
  tomics:
    wet_root_cap: 0.10
    dry_root_cap: 0.18
    lai_target_center: 2.75

forcing:
  csv_path: ../../data/forcing/tomics_tomato_example.csv
  default_dt_s: 21600
  default_co2_ppm: 420
  max_steps: 12

paths:
  repo_root: ../..
  output_root: out/tomics/analysis/partition-compare
  features_dir: artifacts/tomics_alloc_features

plots:
  comparison_plot_spec: configs/plotkit/tomics/partition_compare.yaml
