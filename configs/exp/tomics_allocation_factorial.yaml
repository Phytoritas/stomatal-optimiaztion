exp:
  name: tomics_allocation_factorial

pipeline:
  model: tomato_legacy
  partition_policy: tomics
  allocation_scheme: 4pool
  theta_substrate: 0.33
  fixed_lai: 2.4
  partition_policy_params:
    wet_root_cap: 0.10
    dry_root_cap: 0.18
    lai_target_center: 2.75

forcing:
  csv_path: ../../data/forcing/tomics_tomato_example.csv
  default_dt_s: 21600
  default_co2_ppm: 420
  max_steps: 192
  repeat_cycles: 16

study:
  shortlist_count: 2
  wet_theta_threshold: 0.40
  canopy_lai_floor: 2.0
  leaf_fraction_floor: 0.18

stage1:
  theta_substrate: [0.20, 0.33, 0.50]
  candidates:
    - architecture_id: shipped_default_tomics
      partition_policy: tomics
      fruit_structure_mode: tomsim_truss_cohort
      fruit_partition_mode: legacy_sink_exact
      vegetative_demand_mode: tomsim_constant_wholecrop
      reserve_buffer_mode: "off"
      fruit_feedback_mode: "off"
      sla_mode: derived_not_driver
      maintenance_mode: rgr_adjusted
      canopy_governor_mode: lai_band
      root_representation_mode: bounded_explicit_root
      thorp_root_correction_mode: bounded
      temporal_coupling_mode: daily_alloc
      allocation_scheme: 4pool
      wet_root_cap: 0.10
      dry_root_cap: 0.18
      lai_target_center: 2.75
      leaf_fraction_of_shoot_base: 0.70
      smoothing_tau_days: 1.0
      thorp_root_blend: 1.0
      fruit_load_multiplier: 1.0
    - architecture_id: tomsim_storage_candidate
      partition_policy: tomics_alloc_research
      fruit_structure_mode: tomsim_truss_cohort
      fruit_partition_mode: legacy_sink_exact
      vegetative_demand_mode: tomsim_constant_wholecrop
      reserve_buffer_mode: tomsim_storage_pool
      fruit_feedback_mode: "off"
      sla_mode: derived_not_driver
      maintenance_mode: rgr_adjusted
      canopy_governor_mode: lai_band_plus_leaf_floor
      root_representation_mode: bounded_explicit_root
      thorp_root_correction_mode: bounded
      temporal_coupling_mode: buffered_daily
      allocation_scheme: 4pool
      wet_root_cap: 0.10
      dry_root_cap: 0.18
      lai_target_center: 2.75
      leaf_fraction_of_shoot_base: 0.70
      smoothing_tau_days: 1.0
      thorp_root_blend: 1.0
      storage_capacity_g_ch2o_m2: 15.0
      storage_carryover_fraction: 0.80
      fruit_load_multiplier: 1.0
    - architecture_id: dekoning_canopy_candidate
      partition_policy: tomics_alloc_research
      fruit_structure_mode: tomsim_truss_cohort
      fruit_partition_mode: legacy_sink_exact
      vegetative_demand_mode: dekoning_vegetative_unit
      reserve_buffer_mode: "off"
      fruit_feedback_mode: dekoning_source_demand_abort_proxy
      sla_mode: derived_not_driver
      maintenance_mode: rgr_adjusted
      canopy_governor_mode: lai_band_plus_leaf_floor
      root_representation_mode: bounded_explicit_root
      thorp_root_correction_mode: bounded
      temporal_coupling_mode: daily_alloc
      allocation_scheme: 4pool
      wet_root_cap: 0.10
      dry_root_cap: 0.18
      lai_target_center: 2.75
      leaf_fraction_of_shoot_base: 0.72
      smoothing_tau_days: 1.0
      thorp_root_blend: 1.0
      fruit_feedback_threshold: 0.85
      fruit_feedback_slope: 0.35
      fruit_load_multiplier: 1.0
    - architecture_id: vanthoor_buffer_candidate
      partition_policy: tomics_alloc_research
      fruit_structure_mode: vanthoor_fixed_boxcar
      fruit_partition_mode: legacy_sink_exact
      vegetative_demand_mode: tomsim_constant_wholecrop
      reserve_buffer_mode: vanthoor_carbohydrate_buffer
      fruit_feedback_mode: "off"
      sla_mode: seasonal_empirical_proxy
      maintenance_mode: buffer_linked
      canopy_governor_mode: lai_band
      root_representation_mode: stem_root_lumped_vanthoor
      thorp_root_correction_mode: "off"
      temporal_coupling_mode: buffered_daily
      allocation_scheme: 3pool
      wet_root_cap: 0.08
      dry_root_cap: 0.15
      lai_target_center: 2.75
      leaf_fraction_of_shoot_base: 0.68
      smoothing_tau_days: 1.0
      thorp_root_blend: 0.0
      buffer_capacity_g_ch2o_m2: 18.0
      buffer_min_fraction: 0.10
      fruit_load_multiplier: 1.0
    - architecture_id: tomgro_feedback_candidate
      partition_policy: tomics_alloc_research
      fruit_structure_mode: tomgro_age_class
      fruit_partition_mode: legacy_sink_exact
      vegetative_demand_mode: tomgro_dynamic_age
      reserve_buffer_mode: "off"
      fruit_feedback_mode: tomgro_abort_proxy
      sla_mode: tomgro_independent_driver
      maintenance_mode: fixed
      canopy_governor_mode: "off"
      root_representation_mode: implicit_small_root
      thorp_root_correction_mode: "off"
      temporal_coupling_mode: hourly_source_daily_alloc
      allocation_scheme: 4pool
      wet_root_cap: 0.08
      dry_root_cap: 0.15
      lai_target_center: 2.50
      leaf_fraction_of_shoot_base: 0.65
      smoothing_tau_days: 1.0
      thorp_root_blend: 0.0
      fruit_feedback_threshold: 0.80
      fruit_feedback_slope: 0.50
      fruit_load_multiplier: 1.0
    - architecture_id: kuijpers_hybrid_candidate
      partition_policy: tomics_alloc_research
      fruit_structure_mode: tomsim_truss_cohort
      fruit_partition_mode: legacy_sink_exact
      vegetative_demand_mode: dekoning_vegetative_unit
      reserve_buffer_mode: tomsim_storage_pool
      fruit_feedback_mode: "off"
      sla_mode: derived_not_driver
      maintenance_mode: buffer_linked
      canopy_governor_mode: lai_band_plus_leaf_floor
      root_representation_mode: bounded_explicit_root
      thorp_root_correction_mode: bounded_hysteretic
      temporal_coupling_mode: buffered_daily
      allocation_scheme: 4pool
      wet_root_cap: 0.10
      dry_root_cap: 0.18
      lai_target_center: 2.75
      leaf_fraction_of_shoot_base: 0.72
      smoothing_tau_days: 3.0
      thorp_root_blend: 0.50
      storage_capacity_g_ch2o_m2: 15.0
      storage_carryover_fraction: 0.80
      fruit_load_multiplier: 1.0

stage2:
  theta_substrate: 0.33
  parameter_axes:
    wet_root_cap: [0.08, 0.10, 0.12]
    dry_root_cap: [0.15, 0.18, 0.21]
    lai_target_center: [2.5, 2.75, 3.0]
    leaf_fraction_of_shoot_base: [0.65, 0.70, 0.75]
    smoothing_tau_days: [1, 3]
    thorp_root_blend: [0.0, 0.5, 1.0]
    storage_capacity_g_ch2o_m2: [10.0, 15.0, 20.0]
    storage_carryover_fraction: [0.60, 0.80]

stage3:
  theta_substrate:
    wet: 0.50
    moderate: 0.33
    dry: 0.20
  fruit_load_regimes:
    baseline: 1.00
    high: 1.25

paths:
  repo_root: ../..
  output_root: out/tomics/analysis/allocation-factorial

plots:
  summary_plot_spec: configs/plotkit/tomics/allocation_factorial_summary.yaml
  main_effects_plot_spec: configs/plotkit/tomics/allocation_factorial_main_effects.yaml
